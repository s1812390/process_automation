x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    logging: *default-logging

  backend:
    build: ./backend
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PIP_INDEX_URL=https://pypi.org/simple/
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - python_envs:/data/pyenvs
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    logging: *default-logging

  celery-worker:
    build: ./backend
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PIP_INDEX_URL=https://pypi.org/simple/
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - python_envs:/data/pyenvs
    command: celery -A app.celery_app worker --queues=high,normal,default --concurrency=2 --loglevel=info
    logging: *default-logging

  celery-beat:
    build: ./backend
    depends_on:
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    command: celery -A app.celery_app beat --scheduler app.beat_schedule.DatabaseScheduler --loglevel=info --schedule /data/celerybeat-schedule
    volumes:
      - celery_beat_schedule:/data
    logging: *default-logging

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BASE_PATH: /
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    logging: *default-logging

volumes:
  celery_beat_schedule:
  python_envs:
